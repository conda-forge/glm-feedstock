{% set name = "GLM" %}
{% set version = "1.0.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/g-truc/glm/archive/refs/tags/{{ version }}.tar.gz
  sha256: 6775e47231a446fd086d660ecc18bcd076531cfedd912fbd66e576b118607001

  patches:
    - patches/macos_test_errors.patch

build:
  number: 0
  skip: true  # [win and vc<14]

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - cmake
    - make  # [unix]

test:
  commands:
    - test -r "${PREFIX}/include/glm"  # [unix]
    - if not exist %LIBRARY_INC%\glm exit 1  # [win]
    - cmake-package-check glm --targets glm::glm
  requires:
    - cmake-package-check
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}

about:
  home: https://glm.g-truc.net
  license: MIT
  license_family: MIT
  license_file: manual.md
  summary: OpenGL Mathematics
  dev_url: https://github.com/g-truc/glm

extra:
  recipe-maintainers:
    - traversaro
